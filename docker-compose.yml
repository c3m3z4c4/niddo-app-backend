version: '3.8'

services:
  backend:
    build: .
    restart: always
    ports:
      - "3003:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: privadas_del_parque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_stable_data:/var/lib/postgresql/data

volumes:
  postgres_stable_data:
